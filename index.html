<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMMANDER ULTIMATE | THE BEAST EDITION</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Heebo:wght@100;300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --neon-green: #c8f135;
            --deep-black: #050507;
            --card-bg: #111118;
            --input-bg: #1a1a24;
            --border-color: #2a2a3a;
            --text-primary: #ffffff;
            --text-secondary: #8a8a9d;
            --danger: #ff3e3e;
            --warning: #ffaa00;
            --success: #00f0ad;
            --font-main: 'Heebo', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        /* Base Setup */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; padding: 0; background: var(--deep-black); color: var(--text-primary);
            font-family: var(--font-main); height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--deep-black); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* --- Header System --- */
        .app-header {
            padding: 20px; background: linear-gradient(180deg, var(--card-bg) 0%, transparent 100%);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .app-title { font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 3px; color: var(--neon-green); text-shadow: 0 0 15px rgba(200, 241, 53, 0.4); }
        .status-pill { background: var(--input-bg); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        /* --- Main Content --- */
        #viewport { flex: 1; overflow-y: auto; padding: 15px; position: relative; scroll-behavior: smooth; }
        .view-section { display: none; opacity: 0; transform: translateY(15px); transition: 0.4s ease; }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- Global Components --- */
        .glass-card {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px;
            padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--neon-green);
        }

        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-item { background: var(--input-bg); border-radius: 18px; padding: 15px; border: 1px solid transparent; transition: 0.3s; }
        .stat-item:active { border-color: var(--neon-green); background: #222230; }
        .stat-label { color: var(--text-secondary); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: block; }
        .stat-value { font-family: var(--font-mono); font-size: 1.4rem; color: var(--text-primary); font-weight: 700; }

        .btn {
            border: none; border-radius: 16px; padding: 18px; font-weight: 900; font-size: 1rem;
            cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-main { background: var(--neon-green); color: var(--deep-black); box-shadow: 0 5px 20px rgba(200,241,53,0.3); }
        .btn-ghost { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .btn:active { transform: scale(0.96); }

        /* --- Navigation System --- */
        .nav-bar {
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color); display: grid; grid-template-columns: repeat(5, 1fr);
            height: 85px; padding-bottom: 15px;
        }
        .nav-btn {
            background: none; border: none; color: var(--text-secondary); display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 4px; transition: 0.3s;
        }
        .nav-btn.active { color: var(--neon-green); }
        .nav-btn span { font-size: 0.65rem; font-weight: 900; }
        .nav-icon { font-size: 1.4rem; }

        /* --- Page Specifics --- */
        #map { height: 280px; border-radius: 24px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .log-item {
            background: var(--input-bg); padding: 12px; border-radius: 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; border-right: 3px solid var(--neon-green);
        }

        /* --- Notifications --- */
        #toast-container { position: fixed; top: 20px; left: 20px; right: 20px; z-index: 9999; pointer-events: none; }
        .toast {
            background: var(--card-bg); border: 1px solid var(--neon-green); color: #fff;
            padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: var(--shadow);
            animation: toastIn 0.3s forwards, toastOut 0.3s 2.7s forwards;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(-20px); } }

    </style>
</head>
<body>

<div id="toast-container"></div>

<header class="app-header">
    <div class="app-title">COMMANDER</div>
    <div class="status-pill">
        <div class="status-dot"></div>
        <span id="header-timer">READY</span>
    </div>
</header>

<main id="viewport">
    
    <!-- DASHBOARD VIEW -->
    <section id="view-dash" class="view-section active">
        <div class="glass-card">
            <h3 style="margin:0 0 5px 0;">שלום, לוחם פלדה</h3>
            <p style="color:var(--text-secondary); font-size:0.85rem; margin:0;">היום זה יום מעולה לשבור שיא אישי.</p>
        </div>

        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-label">קילומטראז' חודשי</span>
                <span class="stat-value">42.8</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">זמן עבודה</span>
                <span class="stat-value">05:12</span>
            </div>
        </div>

        <div class="glass-card">
            <canvas id="performanceChart" height="150"></canvas>
        </div>

        <div class="glass-card">
            <h4 style="margin-top:0; color:var(--neon-green);">הישגים אחרונים</h4>
            <div id="badge-container" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:5px;">
                <!-- Badges dynamically added -->
            </div>
        </div>
    </section>

    <!-- TRAINING ENGINE VIEW -->
    <section id="view-train" class="view-section">
        <div class="glass-card">
            <h3 style="margin-top:0;">מחולל אימוני עצימות</h3>
            <label style="font-size:0.8rem; color:var(--text-secondary);">בחר מוקד אימון:</label>
            <select id="train-type" style="width:100%; padding:12px; background:var(--input-bg); color:#fff; border:1px solid var(--border-color); border-radius:12px; margin:10px 0;">
                <option value="vo2">שיפור צריכת חמצן (VO2 Max)</option>
                <option value="threshold">ריצת סף אנאירובי</option>
                <option value="military">דימוי יום סיירות (Hills & Sand)</option>
            </select>
            <button class="btn btn-main" onclick="TrainingEngine.generate()">צור תוכנית אימון</button>
        </div>
        <div id="training-output"></div>
    </section>

    <!-- ACTIVE TRACKER VIEW -->
    <section id="view-run" class="view-section">
        <div id="map"></div>
        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-label">מרחק</span>
                <span class="stat-value" id="run-km">0.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">קצב נוכחי</span>
                <span class="stat-value" id="run-pace">--:--</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">קלוריות</span>
                <span class="stat-value" id="run-cal">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">זמן אימון</span>
                <span class="stat-value" id="run-time">00:00</span>
            </div>
        </div>
        <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
            <button id="main-run-btn" class="btn btn-main" onclick="Tracker.toggle()">התחל משימה</button>
            <button class="btn btn-ghost" onclick="Tracker.addLap()">LAP</button>
        </div>
    </section>

    <!-- HISTORY LOG VIEW -->
    <section id="view-log" class="view-section">
        <h3 style="margin-right:10px;">יומן מבצעים</h3>
        <div id="history-list"></div>
        <button class="btn btn-ghost" style="margin-top:20px;" onclick="History.clearAll()">נקה היסטוריה</button>
    </section>

    <!-- SETTINGS VIEW -->
    <section id="view-settings" class="view-section">
        <div class="glass-card">
            <h3>פרופיל פיזיולוגי</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div>
                    <label class="stat-label">גיל</label>
                    <input type="number" id="user-age" value="18">
                </div>
                <div>
                    <label class="stat-label">משקל (ק"ג)</label>
                    <input type="number" id="user-weight" value="70">
                </div>
            </div>
            <button class="btn btn-main" style="margin-top:15px;" onclick="saveSettings()">עדכן נתונים</button>
        </div>
    </section>

</main>

<nav class="nav-bar">
    <button class="nav-btn active" onclick="Router.go('dash')">
        <span class="nav-icon">🛡️</span><span>ראשי</span>
    </button>
    <button class="nav-btn" onclick="Router.go('train')">
        <span class="nav-icon">⚔️</span><span>אימון</span>
    </button>
    <button class="nav-btn" onclick="Router.go('run')">
        <span class="nav-icon">🛰️</span><span>שטח</span>
    </button>
    <button class="nav-btn" onclick="Router.go('log')">
        <span class="nav-icon">📑</span><span>יומן</span>
    </button>
    <button class="nav-btn" onclick="Router.go('settings')">
        <span class="nav-icon">⚙️</span><span>הגדרות</span>
    </button>
</nav>

<script>
    /**
     * COMMANDER ULTIMATE - CORE LOGIC
     * Version: 4.0.0
     */

    // --- UTILS & GLOBAL STATE ---
    const State = {
        activeView: 'dash',
        workouts: JSON.parse(localStorage.getItem('c_workouts') || '[]'),
        isRunning: false,
        timer: 0,
        distance: 0,
        map: null,
        userPath: null,
        interval: null,
        chart: null
    };

    const UI = {
        toast: (msg) => {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = 'toast';
            div.textContent = msg;
            container.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
    };

    // --- ROUTER SYSTEM ---
    const Router = {
        go: (view) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const target = document.getElementById(`view-${view}`);
            target.classList.add('active');
            
            // Find nav button
            const navBtns = document.querySelectorAll('.nav-btn');
            navBtns.forEach(btn => {
                if(btn.innerText.includes(Router.getLabel(view))) btn.classList.add('active');
            });

            if(view === 'run') Tracker.initMap();
            if(view === 'dash') Dashboard.render();
            if(view === 'log') History.render();
        },
        getLabel: (v) => {
            const m = {dash:'ראשי', train:'אימון', run:'שטח', log:'יומן', settings:'הגדרות'};
            return m[v];
        }
    };

    // --- TRAINING LOGIC ---
    const TrainingEngine = {
        generate: () => {
            const type = document.getElementById('train-type').value;
            const container = document.getElementById('training-output');
            let workouts = [];

            if(type === 'vo2') {
                workouts = [
                    {n: 'חימום', d: '15 דקות ריצה קלה מאוד + 4 מתפרצות של 50 מטר'},
                    {n: 'אינטרוול מרכזי', d: '4 פעמים 1,000 מטר בקצב מהיר ב-5 שניות מקצב ה-5 ק"מ שלך.'},
                    {n: 'התאוששות', d: '3 דקות הליכה בין סט לסט.'}
                ];
            } else if(type === 'military') {
                workouts = [
                    {n: 'כוח מתפרץ', d: '20 ספרינטים בחול עמוק (30 מטר), חזרה בזחילה.'},
                    {n: 'חוסן מנטלי', d: '6 ק"מ ריצה עם שינויי קצב כל 500 מטר (ספרינט/קליל).'}
                ];
            }

            let html = '<div class="glass-card" style="border-right: 4px solid var(--warning);">';
            workouts.forEach(w => {
                html += `<div style="margin-bottom:15px;">
                            <strong style="color:var(--neon-green)">● ${w.n}</strong><br>
                            <span style="font-size:0.85rem; color:var(--text-secondary)">${w.d}</span>
                         </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            UI.toast("תוכנית אימון נבנתה בהצלחה!");
        }
    };

    // --- TRACKER SYSTEM ---
    const Tracker = {
        initMap: () => {
            if(State.map) return;
            State.map = L.map('map', { zoomControl: false }).setView([32.085, 34.781], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(State.map);
            State.userPath = L.polyline([], {color: '#c8f135', weight: 5}).addTo(State.map);
        },
        toggle: () => {
            const btn = document.getElementById('main-run-btn');
            State.isRunning = !State.isRunning;

            if(State.isRunning) {
                btn.textContent = "עצור משימה";
                btn.style.background = "var(--danger)";
                UI.toast("משימה החלה. GPS פעיל.");
                State.interval = setInterval(Tracker.tick, 1000);
            } else {
                btn.textContent = "התחל משימה";
                btn.style.background = "var(--neon-green)";
                clearInterval(State.interval);
                Tracker.save();
            }
        },
        tick: () => {
            State.timer++;
            State.distance += 0.0028; // Simulated distance for demo
            
            const mins = Math.floor(State.timer / 60);
            const secs = State.timer % 60;
            const timeStr = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            
            document.getElementById('run-time').textContent = timeStr;
            document.getElementById('header-timer').textContent = timeStr;
            document.getElementById('run-km').textContent = State.distance.toFixed(2);
            document.getElementById('run-cal').textContent = Math.floor(State.distance * 65);
        },
        save: () => {
            const workout = {
                id: Date.now(),
                date: new Date().toLocaleDateString('he-IL'),
                dist: State.distance.toFixed(2),
                time: document.getElementById('run-time').textContent
            };
            State.workouts.unshift(workout);
            localStorage.setItem('c_workouts', JSON.stringify(State.workouts));
            UI.toast("אימון נשמר ביומן המבצעים.");
            // Reset
            State.timer = 0; State.distance = 0;
        }
    };

    // --- DASHBOARD LOGIC ---
    const Dashboard = {
        render: () => {
            if(State.chart) State.chart.destroy();
            const ctx = document.getElementById('performanceChart').getContext('2d');
            State.chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['א','ב','ג','ד','ה','ו','ש'],
                    datasets: [{
                        label: 'ק"מ',
                        data: [4, 7, 0, 12, 5, 8, 2],
                        backgroundColor: '#c8f135'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false } } }
                }
            });

            // Badges
            const bCont = document.getElementById('badge-container');
            const badges = ['🏃5K', '🔥STREAK', '🎖️VET', '⚡FAST'];
            bCont.innerHTML = badges.map(b => `<div class="status-pill" style="white-space:nowrap;">${b}</div>`).join('');
        }
    };

    // --- HISTORY SYSTEM ---
    const History = {
        render: () => {
            const list = document.getElementById('history-list');
            if(State.workouts.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">אין אימונים רשומים עדיין.</p>';
                return;
            }
            list.innerHTML = State.workouts.map(w => `
                <div class="log-item">
                    <div>
                        <div style="font-weight:900;">${w.date}</div>
                        <div style="font-size:0.75rem; color:var(--text-secondary);">${w.time} דקות</div>
                    </div>
                    <div style="font-family:var(--font-mono); font-weight:900; color:var(--neon-green);">${w.dist} KM</div>
                </div>
            `).join('');
        },
        clearAll: () => {
            if(confirm("למחוק את כל היסטוריית האימונים?")) {
                State.workouts = [];
                localStorage.removeItem('c_workouts');
                History.render();
            }
        }
    };

    // Init on load
    window.onload = () => {
        Dashboard.render();
        UI.toast("מערכת COMMANDER מוכנה לפעולה.");
    };

</script>
</body>
</html>
